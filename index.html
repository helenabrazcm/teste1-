<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Olá Mundo - Homem-Aranha</title>
    <style>
        /* O CSS começa aqui */
        body {
            /* Adicionando a imagem do Homem-Aranha */
            background-image: url('https://images.unsplash.com/photo-1635805737707-575885ab0820?q=80&w=1974&auto=format&fit=crop');
            background-size: cover; /* Faz a imagem cobrir a tela toda */
            background-position: center; /* Centraliza a imagem */
            background-attachment: fixed; /* Mantém o fundo fixo ao rolar */
            
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .cartao {
            /* Adicionei um pouco de transparência para o fundo aparecer levemente */
            background-color: rgba(255, 255, 255, 0.9);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            /* Mudei a borda para vermelho para combinar com o Homem-Aranha */
            border-top: 5px solid #b11313; 
            max-width: 300px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        p {
            color: #666;
        }

        button {
            /* Mudei a cor do botão para o vermelho do Aranha */
            background-color: #b11313;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: bold;
        }

        button:hover {
            background-color: #2b3a8c; /* Azul escuro no hover */
        }
    </style>
</head>
<body>

    <div class="cartao">
        <h1>Olá, Mundo!</h1>
        <p>Este código agora tem o estilo do Amigão da Vizinhança.</p>
        <button onclick="alert('Com grandes poderes, vêm grandes responsabilidades!')">Clique aqui</button>
    </div>

</body>
</html>
