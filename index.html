<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Olá Mundo Estilizado</title>
 <style>
    body {
        /* Substitua a URL abaixo por uma imagem de sua preferência */
        background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                          url('https://images.alphacoders.com/131/1312384.jpeg');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .cartao {
        background-color: rgba(255, 255, 255, 0.9); /* Branco com leve transparência */
        backdrop-filter: blur(5px); /* Efeito de vidro embaçado */
        padding: 2rem;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        text-align: center;
        border-top: 5px solid #b11313; /* Vermelho do Aranha */
        max-width: 300px;
    }

    h1 {
        color: #b11313; /* Vermelho do uniforme */
        margin-bottom: 10px;
    }

    p {
        color: #333;
        font-weight: 500;
    }

    button {
        background-color: #2b3a8c; /* Azul do uniforme */
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 5px;
        cursor: pointer;
        transition: transform 0.2s, background 0.3s;
    }

    button:hover {
        background-color: #1a235a;
        transform: scale(1.05); /* Efeito de pulo no botão */
    }
</style>
</head>
<body>

    <div class="cartao">
        <h1>Olá, Mundo!</h1>
        <p>Este código agora tem estilo profissional.</p>
        <button onclick="alert('Oi!')">Clique aqui</button>
    </div>

</body>
</html>
