<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Wheels: Fuel the Future</title>
    <style>
        :root {
            --hw-red: #e60000;
            --hw-orange: #ff6a00;
            --hw-yellow: #ffcc00;
            --dark-asphalt: #0f0f0f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--dark-asphalt);
            background: radial-gradient(circle at center, #222 0%, #050505 100%);
            font-family: 'Impact', 'Arial Black', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* Container de Velocidade */
        #speed-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        .streak {
            position: absolute;
            background: linear-gradient(to right, transparent, var(--hw-yellow), var(--hw-red));
            height: 2px;
            border-radius: 2px;
            filter: blur(1px);
            box-shadow: 0 0 12px var(--hw-red);
            animation: drive-fast linear infinite;
        }

            border-radius: 15px;
            text-align: center;
