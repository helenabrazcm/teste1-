<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Wheels - Yellow Edition</title>
    <style>
        :root {
            --hw-yellow: #ffcc00; /* Amarelo Hot Wheels */
            --hw-blue: #007bff;
            --hw-orange: #ff8000;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('https://images.mattel.net/image/upload/w_1512,f_auto,c_scale/shop-contentstack/blt656fd41acd92bb54/69385a191619e3686b799949/HW_HP_MTP_Background_3840x1245.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* --- Pista e Carro --- */
        .race-track-area {
            position: absolute;
            bottom: 5%; 
            width: 100%;
            height: 150px;
            z-index: 15;
            pointer-events: none;
        }

        .orange-track {
            position: absolute;
            bottom: 40px;
            left: 0; 
            height: 20px;
            background: var(--hw-orange);
            box-shadow: 0 4px 15px rgba(255, 128, 0, 0.5);
            width: 0;
            border-radius: 0 10px 10px 0;
            animation: move-track-right 4s ease-in-out infinite;
        }

        .car-runner {
            position: absolute;
            bottom: 38px;
            left: -100px; 
            font-size: 60px; 
            z-index: 16;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
            transform: scaleX(-1); 
            animation: move-car-right 4s ease-in-out infinite;
        }

        @keyframes move-car-right {
            0% { left: -100px; }
            85%, 100% { left: 115%; }
        }

        @keyframes move-track-right {
            0% { width: 0; }
            85%, 100% { width: 115%; }
        }

        /* --- Card Amarelo com Letras Brancas --- */
        .cartao-hw {
            position: relative;
            z-index: 10;
            background: var(--hw-yellow); /* Fundo Amarelo */
            padding: 3rem;
            border-radius: 20px;
            text-align: center;
            border: 4px solid var(--white);
            border-bottom: 10px solid var(--hw-orange);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 90%;
            margin-top: -50px;
            transform: skewX(-2deg); /* Inclinação para dar ideia de velocidade */
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            color: var(--white); /* Escrita Branca */
            letter-spacing: -2px;
            margin-bottom: 10px;
            /* Sombra para destacar o branco no amarelo */
            text-shadow: 3px 3px 0px rgba(0,0,0,0.15);
        }

        p {
            color: var(--white); /* Escrita Branca */
            font-size: 1.2rem;
            margin-bottom: 30px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        /* --- Logo Botão --- */
        .logo-link {
            display: inline-block;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(255,255,255,0.2);
            padding: 10px;
            border-radius: 10px;
        }

        .logo-link:hover {
            transform: scale(1.1) rotate(-3deg);
            background: rgba(255,255,255,0.4);
        }

        .hw-symbol {
            width: 200px;
            height: auto;
        }

    </style>
</head>
<body>

    <div class="cartao-hw">
        <h1>HOT WHEELS</h1>
        <p>Acelere para a diversão.</p>
        <div class="btn-group">
            <a href="https://shop.mattel.com/pages/hot-wheels" target="_blank" class="logo-link">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b2/Hot_Wheels_logo.svg" alt="Hot Wheels" class="hw-symbol">
            </a>
        </div>
    </div>

    <div class="race-track-area">
        <div class="orange-track"></div>
        <div class="car-runner">🏎️</div>
    </div>

</body>
</html>
