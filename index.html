<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Wheels - Blue Velocity</title>
    <style>
        :root {
            --hw-blue: #0066ff;
            --hw-cyan: #00f2ff;
            --hw-orange: #ff8000; /* Cor clássica da pista */
            --hw-dark: #001220;
            --asphalt: #050a0f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at center, #001a2e 0%, #020508 100%);
            font-family: 'Segoe UI', Roboto, 'Arial Black', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* --- Elementos da Animação de Corrida --- */
        
        .track-container {
            position: absolute;
            bottom: 15%;
            width: 100%;
            height: 40px;
            display: flex;
            align-items: center;
        }

        .track {
            position: absolute;
            height: 12px;
            background: var(--hw-orange);
            box-shadow: 0 0 20px rgba(255, 128, 0, 0.6), inset 0 0 5px white;
            width: 0; /* Começa vazia */
            left: 0;
            border-radius: 0 10px 10px 0;
            animation: build-track 3s linear infinite;
            z-index: 5;
        }

        .car {
            position: absolute;
            bottom: 5px;
            left: -150px; /* Começa fora da tela */
            width: 120px;
            z-index: 6;
            animation: car-race 3s linear infinite;
        }

        /* Desenho simples do carro via CSS/SVG para garantir que apareça */
        .car-body {
            fill: var(--hw-blue);
            filter: drop-shadow(0 0 10px var(--hw-cyan));
        }

        /* --- Estilos Originais Mantidos --- */

        #glitter-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .sparkle {
            position: absolute;
            background: linear-gradient(to bottom, var(--hw-cyan), var(--hw-blue));
            border-radius: 1px;
            filter: blur(0.5px);
            box-shadow: 0 0 10px var(--hw-blue);
            animation: nitro-drift linear infinite;
        }

        .cartao-hw {
            position: relative;
            z-index: 10;
            background: rgba(0, 20, 40, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 3.5rem;
            border-radius: 15px;
            text-align: center;
            border: 2px solid rgba(0, 102, 255, 0.4);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.9);
            max-width: 500px;
            width: 90%;
            transform: skewX(-3deg);
            margin-bottom: 100px; /* Espaço para o carro passar */
        }

        h1 {
            font-size: 4rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: -3px;
            background: linear-gradient(to bottom, #ffffff 10%, var(--hw-cyan) 40%, var(--hw-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0, 102, 255, 0
