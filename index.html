<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Wheels - Mundo Moderno</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ffcc00; /* Amarelo Hot Wheels */
            --primary-hover: #ffaa00;
            --bg-overlay: rgba(15, 23, 42, 0.7); /* Overlay escuro para destacar o card */
            --text-main: #1e293b;
            --text-muted: #64748b;
            --white: #ffffff;
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Imagem de fundo temática */
            background: linear-gradient(var(--bg-overlay), var(--bg-overlay)), 
                        url('https://images.unsplash.com/photo-1594787318286-3d835c1d207f?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        /* O link agora envolve o card para torná-lo clicável */
        .link-card {
            text-decoration: none;
            display: contents; /* Faz o link se comportar como o elemento interno */
        }

        .cartao {
            background-color: var(--white);
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: var(--shadow);
            text-align: center;
            border-top: 8px solid #f00; /* Vermelho Hot Wheels */
            max-width: 400px;
            width: 90%;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .cartao:hover {
            transform: scale(1.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 0.75rem;
            color: #0044ab; /* Azul Hot Wheels */
            text-transform: uppercase;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            line-height: 1.6;
            font-size: 1.1rem;
        }

        button {
            background-color: var(--primary-color);
            color: #000;
            border: none;
            padding: 0.85rem 1.8rem;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        @media (min-width: 480px) {
            button { width: auto; }
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <a href="https://shop.mattel.com/pt-br/pages/hot-wheels" target="_blank" class="link-card">
        <main class="cartao">
            <h1>Hot Wheels!</h1>
            <p>Clique em qualquer lugar do card para explorar a loja oficial ou no botão abaixo para um alerta.</p>
            <button type="button" onclick="celebrar(event)">Ver Alerta</button>
        </main>
    </a>

    <script>
        function celebrar(event) {
            event.stopPropagation(); // Impede que o link abra ao clicar no botão
            alert('🚀 Velocidade máxima! Parabéns pelo código!');
        }
    </script>
</body>
</html>
