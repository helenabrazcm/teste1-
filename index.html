<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Wheels - Blue Velocity</title>
    <style>
        :root {
            --hw-blue: #0066ff;
            --hw-cyan: #00f2ff;
            --hw-orange: #ff8000;
            --asphalt: #050a0f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at center, #001a2e 0%, #020508 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* --- CONTAINER DA CORRIDA --- */
        .race-track-area {
            position: absolute;
            bottom: 100px; /* Altura onde o carro vai passar */
            width: 100%;
            height: 60px;
            z-index: 20;
        }

        /* A Pista Laranja */
        .orange-track {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 15px;
            background: var(--hw-orange);
            box-shadow: 0 0 20px rgba(255, 128, 0, 0.8);
            border-radius: 0 10px 10px 0;
            width: 0; /* Começa em zero */
            animation: move-track 4s linear infinite;
        }

        /* O Carro */
        .car-runner {
            position: absolute;
            bottom: 5px;
            left: -100px;
            font-size: 50px; /* Tamanho do carro (emoji) */
            filter: drop-shadow(0 0 10px var(--hw-cyan));
            animation: move-car 4s linear infinite;
            z-index: 21;
            white-space: nowrap;
        }

        /* --- CARTÃO PRINCIPAL --- */
        .cartao-hw {
            position: relative;
            z-index: 50;
            background: rgba(0, 20, 40, 0.7);
            backdrop-filter: blur(15px);
            padding: 3rem;
            border-radius: 20px;
            text-align: center;
            border: 2px solid var(--hw-blue);
            box-shadow: 0 0 30px rgba(0, 102, 255, 0.3);
            transform: skewX(-4deg);
        }

        h1 {
            font-size: 4rem;
            font-style: italic;
            font-weight: 900;
            background: linear-gradient(to bottom, #fff, var(--hw-cyan), var(--hw-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        /* --- ANIMAÇÕES --- */
        @keyframes move-car {
            0% { left: -100px; }
            100% { left: 110%; }
        }

        @keyframes move-track {
            0% { width: 0; }
            100% { width: 110%; }
        }

        /* Faíscas de fundo */
        .sparkle {
            position: absolute;
            background: var(--hw-cyan);
            width: 2px;
            height: 20px;
            opacity: 0.5;
            animation: drift linear infinite;
        }

        @keyframes drift {
            from { transform: translateY(100vh); }
            to { transform: translateY(-10vh); }
        }
    </style>
</head>
<body>

    <div id="particles"></div>

    <div class="cartao-hw">
        <h1>HOT WHEELS</h1>
        <p>Acelere para a diversão.</p>
       
        <div class="btn-group">
            <a href="https://shop.mattel.com/pages/hot-wheels" target="_blank" class="btn-hw">shop</a>
        </div>
    </div>

        <p style="font-style: italic; color: var(--hw-cyan); margin-top: 10px;">VELOCIDADE MÁXIMA</p>
    </div>

    <div class="race-track-area">
        <div class="orange-track"></div>
        <div class="car-runner">🏎️</div>
    </div>

    <script>
        // Criador de partículas simples
        const partContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'sparkle';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = (Math.random() * 2 + 1) + 's';
            p.style.animationDelay = Math.random() * 3 + 's';
            partContainer.appendChild(p);
        }
    </script>
</body>
</html>
