<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider-Man Style</title>
    <style>
        body {
            /* CORREÇÃO: Removidos os sinais < > e adicionada uma URL válida */
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                              url('https://images.alphacoders.com/131/1311545.jpeg');
            
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .cartao {
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            border-top: 8px solid #b11313;
            max-width: 350px;
            transition: all 0.3s ease;
        }

        .cartao:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 60px rgba(177, 19, 19, 0.3);
        }

        h1 {
            color: #b11313;
            margin-bottom: 10px;
            font-size: 2rem;
            text-transform: uppercase;
        }

        p {
            color: #333;
            font-weight: 600;
            line-height: 1.4;
        }

        button {
            background-color: #2b3a8c;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
            margin-top: 20px;
        }

        button:hover {
            background-color: #b11313;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div class="cartao">
        <h1>Spider-Man</h1>
        <p>"Com grandes códigos, vêm grandes responsabilidades."</p>
        <button onclick="alert('THWIP! 🕸️')">Soltar Teia</button>
    </div>

</body>
</html>
