<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Wheels - Blue Velocity</title>
    <style>
        :root {
            --hw-blue: #0066ff;
            --hw-cyan: #00f2ff;
            --hw-dark: #001220;
            --asphalt: #050a0f;
            --hw-orange: #ff8000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--asphalt);
            background: radial-gradient(circle at center, #001a2e 0%, #020508 100%);
            font-family: 'Segoe UI', Roboto, 'Arial Black', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* --- Estilos da Pista e do Carro (Ajustados para baixo e maiores) --- */
        .race-track-area {
            position: absolute;
            bottom: 2%; /* Mais para baixo */
            width: 100%;
            height: 180px; /* Aumentado para comportar o carro maior */
            z-index: 15;
            pointer-events: none;
        }

        .orange-track {
            position: absolute;
            bottom: 40px; /* Posição da pista em relação ao container */
            left: 0;
            height: 18px; /* Pista um pouco mais grossa */
            background: var(--hw-orange);
            box-shadow: 0 0 20px var(--hw-orange), inset 0 0 8px white;
            width: 0;
            border-radius: 0 10px 10px 0;
            animation: move-track 4s linear infinite;
        }

        .car-runner {
            position: absolute;
            bottom: 10px; /* Ajustado para "sentar" na pista */
            left: -350px;
            width: 350px; /* Carro bem maior */
            z-index: 16;
            animation: move-car 4s linear infinite;
        }

        .car-runner img {
            width: 100%;
