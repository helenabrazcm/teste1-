<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Wheels - Blue Velocity</title>
    <style>
        :root {
            --hw-blue: #0066ff;
            --hw-cyan: #00f2ff;
            --hw-dark: #001220;
            --asphalt: #050a0f;
            --hw-orange: #ff8000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--asphalt);
            background: radial-gradient(circle at center, #001a2e 0%, #020508 100%);
            font-family: 'Segoe UI', Roboto, 'Arial Black', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* --- Estilos da Pista e do Carro (Direita para Esquerda) --- */
        .race-track-area {
            position: absolute;
            bottom: 5%; 
            width: 100%;
            height: 150px;
            z-index: 15;
            pointer-events: none;
        }

        .orange-track {
            position: absolute;
            bottom: 40px;
            right: 0; 
            height: 16px;
            background: var(--hw-orange);
            box-shadow: 0 0 20px var(--hw-orange), inset 0 0 8px white;
            width: 0;
            border-radius: 10px 0 0 10px;
            animation: move-track-left 4s linear infinite;
        }

        .car-runner {
            position: absolute;
            bottom: 38px;
            right: -100px;
            font-size: 60px; /* Tamanho reduzido */
            z-index: 16;
            filter: drop-shadow(0 0 12px var(--hw-cyan));
            transform: scaleX(-1); /* Espelha o emoji para apontar para a esquerda */
            animation: move-car-left 4s linear infinite;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes move-car-left {
            0% { right: -100px; }
            100% { right: 115%; }
        }

        @keyframes move-track-left {
            0% { width: 0; }
            100% { width: 115%; }
        }

        /* --- Estilos do Card --- */
        #glitter-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .sparkle {
            position: absolute;
            background: linear-gradient(to bottom, var(--hw-cyan), var(--hw-blue));
            border-radius: 1px;
            filter: blur(0.5px);
            box-shadow: 0 0 10px var(--hw-blue);
            animation: nitro-drift linear infinite;
        }

        .cartao-hw {
            position: relative;
            z-index: 10;
            background: rgba(0, 20, 40, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 3.5rem;
            border-radius: 15px;
            text-align: center;
            border: 2px solid rgba(0, 102, 255, 0.4);
            box-shadow: 0 25px
