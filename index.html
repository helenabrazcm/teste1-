<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Wheels - iOS Yellow Edition</title>
    <style>
        :root {
            --hw-yellow: #fff01c; 
            --hw-blue: #007bff;
            --hw-orange: #ff8000;
            --white: #ffffff;
            --hw-red: #ff0000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('https://images.mattel.net/image/upload/w_1512,f_auto,c_scale/shop-contentstack/blt656fd41acd92bb54/69385a191619e3686b799949/HW_HP_MTP_Background_3840x1245.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        /* --- Elementos Visuais --- */
        .race-track-area {
            position: absolute;
            bottom: 5%; 
            width: 100%;
            height: 150px;
            z-index: 15;
            pointer-events: none;
        }

        .orange-track {
            position: absolute;
            bottom: 40px;
            left: 0; 
            height: 20px;
            background: var(--hw-orange);
            box-shadow: 0 4px 15px rgba(255, 128, 0, 0.5);
            width: 0;
            border-radius: 0 10px 10px 0;
            animation: move-track-right 4s ease-in-out infinite;
        }

        .car-runner {
            position: absolute;
            bottom: 38px;
            left: -100px; 
            font-size: 60px; 
            z-index: 16;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
            transform: scaleX(-1); 
            animation: move-car-right 4s ease-in-out infinite;
        }

        @keyframes move-car-right {
            0% { left: -100px; }
            85%, 100% { left: 115%; }
        }

        @keyframes move-track-right {
            0% { width: 0; }
            85%, 100% { width: 115%; }
        }

        .cartao-hw {
            position: relative;
            z-index: 10;
            background: var(--hw-yellow);
            padding: 3rem;
            border-radius: 25px;
            text-align: center;
            border: 5px solid var(--white);
            border-bottom: 12px solid var(--hw-orange);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            max-width: 500px;
            width: 90%;
            transform: skewX(-2deg);
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            color: var(--hw-red);
            letter-spacing: -2px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0px var(--white);
        }

        p {
            color: #333;
            font-size: 1.2rem;
            margin-bottom: 30px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .logo-link {
            display: inline-block;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: white;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .logo-link:hover {
            transform: scale(1.1) rotate(-3deg);
        }

        .hw-symbol { width: 180px; height: auto; }

        .sound-tip {
            position: absolute;
            top: 20px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            z-index: 100;
        }

        /* Esconde o player do YouTube */
        #youtube-player {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="sound-tip">Clique na tela para acelerar o som! 🏎️💨</div>

    <div id="youtube-player"></div>

    <div class="cartao-hw">
        <h1>HOT WHEELS</h1>
        <p>VAI ENCARAR?</p>
        <div class="btn-group">
            <a href="https://shop.mattel.com/pages/hot-wheels" target="_blank" class="logo-link">
                <img src="https://images.mattel.net/image/upload/w_360,f_auto,c_scale/shop-contentstack/blte066167e3d00f7ef/61f313e0031a18274b668cd8/Hot_Wheels_Logo154x68.png" alt="Hot Wheels" class="hw-symbol">
            </a>
        </div>
    </div>

    <div class="race-track-area">
        <div class="orange-track"></div>
        <div class="car-runner">🏎️</div>
    </div>

    <script>
        // 1. Carrega a API do YouTube de forma assíncrona
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '0',
                width: '0',
                videoId: 'ltX-1kRzOYw', // ID do vídeo solicitado
                playerVars: {
                    'autoplay': 0,
                    'loop': 1,
                    'playlist': 'ltX-1kRzOYw' // Necessário para o loop funcionar
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            // O player está pronto, mas aguarda o clique inicial do usuário
            document.body.addEventListener('click', function() {
                player.playVideo();
                document.querySelector('.sound-tip').style.display = 'none';
            }, { once: true });
        }
    </script>

</body>
</html>
