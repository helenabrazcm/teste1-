 <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Homem-Aranha Style</title>
    <style>
        body {
            /* Imagem do Homem-Aranha direto de um servidor confiável */
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                              url('https://images.alphacoders.com/131/1312384.jpeg');
            
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .cartao {
            background-color: rgba(255, 255, 255, 0.9); /* Branco com transparência */
            backdrop-filter: blur(10px); /* Efeito de vidro embaçado */
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center;
            border-top: 8px solid #b11313; /* Vermelho Aranha */
            max-width: 350px;
            transition: transform 0.3s ease;
        }

        .cartao:hover {
            transform: scale(1.05); /* O cartão cresce um pouco ao passar o mouse */
        }

        h1 {
            color: #b11313;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        p {
            color: #333;
            font-weight: bold;
        }

        button {
            background-color: #2b3a8c; /* Azul Aranha */
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        button:hover {
            background-color: #b11313;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <div class="cartao">
        <h1>Spider-Man!</h1>
        <p>Com grandes códigos, vêm grandes responsabilidades.</p>
        <button onclick="alert('THWIP! 🕸️')">Soltar Teia</button>
    </div>

</body>
</html>
