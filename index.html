<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbie Future World</title>
    <style>
        :root {
            --barbie-pink: #ff00a1;
            --barbie-glow: #ff66c4;
            --soft-pink: #ffe6f2;
            --dark-bg: #1a000d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--dark-bg);
            /* Fundo com degradê inspirado na Mattel */
            background: radial-gradient(circle at center, #2d001a 0%, #0a0005 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* Partículas de Brilho (Glitter Futurista) */
        #glitter-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .sparkle {
            position: absolute;
            background: var(--barbie-pink);
            border-radius: 50%;
            filter: blur(1px);
            box-shadow: 0 0 10px var(--barbie-glow);
            animation: twinkle linear infinite;
        }

        /* Cartão Glassmorphism Barbie */
        .cartao-barbie {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 3.5rem;
            border-radius: 40px;
            text-align: center;
            border: 2px solid rgba(255, 0, 161, 0.3);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5),
                        inset 0 0 30px rgba(255, 0, 161, 0.1);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: -2px;
            background: linear-gradient(to bottom, #ffffff, var(--barbie-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        p {
            color: var(--soft-pink);
            font-size: 1.1rem;
            margin-bottom: 35px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* Botões */
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn-barbie {
            background: var(--barbie-pink);
            color: white;
            text-decoration: none;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(255, 0, 161, 0.4);
            font-size: 0.9rem;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--barbie-pink);
            box-shadow: none;
        }

        .btn-barbie:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 30px rgba(255, 0, 161, 0.6);
            filter: brightness(1.2);
        }

        /* Animação */
        @keyframes twinkle {
            0% { transform: translateY(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-100vh); opacity: 0; }
        }

    </style>
</head>
<body>

    <div id="glitter-container"></div>

    <div class="cartao-barbie">
        <h1>BARBIE</h1>
        <p>You can be anything, even in the future.</p>
       
        <div class="btn-group">
            <a href="https://shop.mattel.com/pt-br/pages/barbie" target="_blank" class="btn-barbie">Shop Now</a>
            <button class="btn-barbie btn-outline" onclick="alert('Explorando a Dreamhouse 2.0...')">Explorar</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('glitter-container');
        const count = 50;

        for (let i = 0; i < count; i++) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
           
            const size = Math.random() * 4 + 2 + 'px';
            sparkle.style.width = size;
            sparkle.style.height = size;
           
            sparkle.style.left = Math.random() * 100 + 'vw';
            sparkle.style.top = Math.random() * 100 + 'vh';
           
            sparkle.style.animationDuration = Math.random() * 3 + 2 + 's';
            sparkle.style.animationDelay = Math.random() * 5 + 's';

            container.appendChild(sparkle);
        }
    </script>
</body>
</html>
