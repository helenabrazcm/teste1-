<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Wheels - Official Style</title>
    <style>
        :root {
            --hw-blue: #007bff; /* Azul oficial */
            --hw-orange: #ff8000; /* Laranja da pista */
            --hw-red: #e41937; /* Vermelho do logo */
            --light-bg: #f4f4f4;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--light-bg);
            background: radial-gradient(circle at center, #ffffff 0%, #e0e0e0 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
            overflow: hidden;
            position: relative;
        }

        /* --- Pista e Carro --- */
        .race-track-area {
            position: absolute;
            bottom: 5%; 
            width: 100%;
            height: 150px;
            z-index: 5;
            pointer-events: none;
        }

        .orange-track {
            position: absolute;
            bottom: 40px;
            left: 0; 
            height: 20px;
            background: var(--hw-orange);
            box-shadow: 0 4px 10px rgba(255, 128, 0, 0.3);
            width: 0;
            border-radius: 0 10px 10px 0;
            animation: move-track-right 4s ease-in-out infinite;
        }

        .car-runner {
            position: absolute;
            bottom: 38px;
            left: -100px; 
            font-size: 60px; 
            z-index: 6;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
            transform: scaleX(-1); 
            animation: move-car-right 4s ease-in-out infinite;
        }

        @keyframes move-car-right {
            0% { left: -100px; }
            80%, 100% { left: 115%; }
        }

        @keyframes move-track-right {
            0% { width: 0; }
            80%, 100% { width: 115%; }
        }

        /* --- Card Estilo Site Oficial --- */
        .cartao-hw {
            position: relative;
            z-index: 10;
            background: var(--white);
            padding: 3rem;
            border-radius: 20px;
            text-align: center;
            border-bottom: 8px solid var(--hw-orange); /* Detalhe da pista no card */
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 90%;
            margin-top: -50px;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            color: var(--hw-blue);
            letter-spacing: -2px;
            margin-bottom: 10px;
            -webkit-text-stroke: 1px #0056b3;
        }

        p {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 30px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- Logo Botão --- */
        .logo-link {
            display: inline-block;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .logo-link:hover {
            transform: scale(1.1) rotate(-3deg);
        }

        .hw-symbol {
            width: 220px;
            height: auto;
            filter: drop-shadow(0 5px 15px rgba(228, 25, 55, 0.3));
        }

        /* --- Partículas de Velocidade (Substituindo o Glitter) --- */
        .speed-line {
            position: absolute;
            background: rgba(0, 123, 255, 0.1);
            height: 2px;
            animation: speed-move linear infinite;
        }

        @keyframes speed-move {
            from { transform: translateX(-100vw); }
            to { transform: translateX(100vw); }
        }
    </style>
</head>
<body>

    <div id="lines-container"></div>

    <div class="cartao-hw">
        <h1>HOT WHEELS</h1>
        <p>Acelere para a diversão.</p>
        <div class="btn-group">
            <a href="https://shop.mattel.com/pages/hot-wheels" target="_blank" class="logo-link">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b2/Hot_Wheels_logo.svg" alt="Hot Wheels" class="hw-symbol">
            </a>
        </div>
    </div>

    <div class="race-track-area">
        <div class="orange-track"></div>
        <div class="car-runner">🏎️</div>
    </div>

    <script>
        // Cria linhas de velocidade sutis no fundo
        const container = document.getElementById('lines-container');
        for (let i = 0; i < 20; i++) {
            const line = document.createElement('div');
            line.className = 'speed-line';
            line.style.width = Math.random() * 100 + 50 + 'px';
            line.style.left = Math.random() * 100 + 'vw';
            line.style.top = Math.random() * 100 + 'vh';
            line.style.animationDuration = Math.random() * 2 + 1 + 's';
            line.style.opacity = Math.random();
            container.appendChild(line);
        }
    </script>
</body>
</html>
