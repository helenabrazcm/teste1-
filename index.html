<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Wheels - Blue Velocity</title>
    <style>
        :root {
            /* Paleta Azul de Alta Performance */
            --hw-blue: #0066ff;
            --hw-cyan: #00f2ff;
            --hw-dark: #001220;
            --asphalt: #050a0f;
            --hw-orange: #ff8000; /* Cor da pista */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--asphalt);
            background: radial-gradient(circle at center, #001a2e 0%, #020508 100%);
            font-family: 'Segoe UI', Roboto, 'Arial Black', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* --- Estilos da Pista e do Carro --- */
        .race-track-area {
            position: absolute;
            bottom: 10%;
            width: 100%;
            height: 100px;
            z-index: 15;
            pointer-events: none;
        }

        .orange-track {
            position: absolute;
            bottom: 20px;
            left: 0;
            height: 12px;
            background: var(--hw-orange);
            box-shadow: 0 0 15px var(--hw-orange), inset 0 0 5px white;
            width: 0;
            border-radius: 0 10px 10px 0;
            animation: move-track 4s linear infinite;
        }

        .car-runner {
            position: absolute;
            bottom: 0;
            left: -250px;
            width: 200px; /* Ajuste do tamanho da imagem */
            z-index: 16;
            animation: move-car 4s linear infinite;
        }

        .car-runner img {
            width: 100%;
            height: auto;
            /* Filtro opcional para dar brilho */
            filter: drop-shadow(0 0 10px var(--hw-cyan));
        }

        /* Animações Sincronizadas */
        @keyframes move-car {
            0% { left: -250px; }
            100% { left: 110%; }
        }

        @keyframes move-track {
            0% { width: 0; }
            100% { width: 110%; }
        }

        /* --- Resto do código original --- */
        #glitter-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .sparkle {
            position: absolute;
            background: linear-gradient(to bottom, var(--hw-cyan), var(--hw-blue));
            border-radius: 1px;
            filter: blur(0.5px);
            box-shadow: 0 0 10px var(--hw-blue);
            animation: nitro-drift linear infinite;
        }

        .cartao-hw {
            position: relative;
            z-index: 10;
