<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Wheels - Blue Velocity</title>
    <style>
        :root {
            --hw-blue: #0066ff;
            --hw-cyan: #00f2ff;
            --hw-dark: #001220;
            --asphalt: #050a0f;
            --hw-orange: #ff8000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--asphalt);
            background: radial-gradient(circle at center, #001a2e 0%, #020508 100%);
            font-family: 'Segoe UI', Roboto, 'Arial Black', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* --- Estilos da Pista e do Carro --- */
        .race-track-area {
            position: absolute;
            bottom: 5%; 
            width: 100%;
            height: 150px;
            z-index: 15;
            pointer-events: none;
        }

        .orange-track {
            position: absolute;
            bottom: 40px;
            left: 0; 
            height: 16px;
            background: var(--hw-orange);
            box-shadow: 0 0 20px var(--hw-orange), inset 0 0 8px white;
            width: 0;
            border-radius: 0 10px 10px 0;
            animation: move-track-right 4s linear infinite;
        }

        .car-runner {
            position: absolute;
            bottom: 38px;
            left: -100px; 
            font-size: 60px; 
            z-index: 16;
            filter: drop-shadow(0 0 12px var(--hw-cyan));
            transform: scaleX(-1); 
            animation: move-car-right 4s linear infinite;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes move-car-right {
            0% { left: -100px; }
            100% { left: 115%; }
        }

        @keyframes move-track-right {
            0% { width: 0; }
            100% { width: 115%; }
        }

        /* --- Estilos do Card --- */
        #glitter-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .sparkle {
            position: absolute;
            background: linear-gradient(to bottom, var(--hw-cyan), var(--hw-blue));
            border-radius: 1px;
            filter: blur(0.5px);
            box-shadow: 0 0 10px var(--hw-blue);
            animation: nitro-drift linear infinite;
        }

        .cartao-hw {
            position: relative;
            z-index: 10;
            background: rgba(0, 20, 40, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 3.5rem;
            border-radius: 15px;
            text-align: center;
            border: 2px solid rgba(0, 102, 255, 0.4);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.9),
                        inset 0 0 20px rgba(0, 242, 255, 0.1);
            max-width: 500px;
            width: 90%;
            transform: skewX(-3deg);
            margin-top: -100px;
        }

        h1 {
            font-size: 4rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: -3px;
            background: linear-gradient(to bottom, #ffffff 10%, var(--hw-cyan) 40%, var(--hw-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            filter: drop-shadow(0 0 15px rgba(0, 102, 255, 0.6));
        }

        p {
            color: var(--hw-cyan);
            font-size: 1.2rem;
            margin-bottom: 35px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-style: italic;
            opacity: 0.9;
        }

        /* --- Estilo do Logo-Botão --- */
        .logo-link {
            display: inline-block;
            transition: transform 0.3s ease;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3));
        }

        .logo-link:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 8px 20px var(--hw-orange));
        }

        .hw-symbol {
            width: 200px;
            height: auto;
        }

        @keyframes nitro-drift {
            0% { transform: translateY(0) scaleY(1); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(-110vh) scaleY(2); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="glitter-container"></div>

    <div class="cartao-hw">
        <h1>HOT WHEELS</h1>
        <p>Acelere para a diversão.</p>
        <div class="btn-group">
            <a href="https://shop.mattel.com/pages/hot-wheels" target="_blank" class="logo-link">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b2/Hot_Wheels_logo.svg" alt="Hot Wheels" class="hw-symbol">
            </a>
        </div>
    </div>

    <div class="race-track-area">
        <div class="orange-track"></div>
        <div class="car-runner">
            🏎️
        </div>
    </div>

    <script>
        const container = document.getElementById('glitter-container');
        const count = 40;

        for (let i = 0; i < count; i++) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.style.width = Math.random() * 2 + 1 + 'px';
            sparkle.style.height = Math.random() * 15 + 10 + 'px';
            sparkle.style.left = Math.random() * 100 + 'vw';
            sparkle.style.top = '100vh';
            sparkle.style.animationDuration = Math.random() * 1 + 0.5 + 's';
            sparkle.style.animationDelay = Math.random() * 4 + 's';
            container.appendChild(sparkle);
        }
    </script>
</body>
</html>
