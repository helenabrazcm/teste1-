<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Wheels - Blue Velocity</title>
    <style>
        :root {
            --hw-blue: #0066ff;
            --hw-cyan: #00f2ff;
            --hw-dark: #001220;
            --asphalt: #050a0f;
            --hw-orange: #ff8000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--asphalt);
            background: radial-gradient(circle at center, #001a2e 0%, #020508 100%);
            font-family: 'Segoe UI', Roboto, 'Arial Black', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* --- Estilos da Pista e do Carro --- */
        .race-track-area {
            position: absolute;
            bottom: 5%; 
            width: 100%;
            height: 180px;
            z-index: 15;
            pointer-events: none;
        }

        .orange-track {
            position: absolute;
            bottom: 40px;
            left: 0;
            height: 18px;
            background: var(--hw-orange);
            box-shadow: 0 0 20px var(--hw-orange), inset 0 0 8px white;
            width: 0;
            border-radius: 0 10px 10px 0;
            animation: move-track 4s linear infinite;
        }

        .car-runner {
            position: absolute;
            bottom: 35px; /* Ajustado para o emoji ficar sobre a pista */
            left: -150px;
            font-size: 80px; /* Tamanho do emoji */
            z-index: 16;
            filter: drop-shadow(0 0 15px var(--hw-cyan));
            animation: move-car 4s linear infinite;
            display: flex;
            align-items: center;
            justify-content: center;
        }
