<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Wheels Future Race</title>
    <style>
        :root {
            /* Cores icônicas da Hot Wheels */
            --hw-orange: #ff4500;
            --hw-yellow: #ffcc00;
            --hw-accent: #ffeb3b;
            --dark-asphalt: #0f0f0f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--dark-asphalt);
            /* Fundo com degradê que lembra fumaça e asfalto */
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            font-family: 'Segoe UI', Roboto, 'Arial Black', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* Partículas de "Faíscas" em vez de Glitter */
        #glitter-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .sparkle {
            position: absolute;
            background: linear-gradient(to bottom, var(--hw-yellow), var(--hw-orange));
            border-radius: 2px; /* Faíscas mais retangulares/agudas */
            filter: blur(0.5px);
            box-shadow: 0 0 8px var(--hw-orange);
            animation: drift linear infinite;
        }

        /* Cartão Hot Wheels Racing */
        .cartao-hw {
            position: relative;
            z-index: 10;
            background: rgba(40, 40, 40, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 3.5rem;
            border-radius: 20px; /* Bordas menos arredondadas, mais industriais */
            text-align: center;
            border: 2px solid rgba(255, 69, 0, 0.4);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8),
                        inset 0 0 20px rgba(255, 204, 0, 0.05);
            max-width: 550px;
            width: 90%;
            transform: skewX(-2deg); /* Inclinação para dar sensação de velocidade */
        }

        h1 {
            font-size: 4rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: -3px;
            /* Efeito de fogo/metal quente */
            background: linear-gradient(to bottom, #ffffff 20%, var(--hw-yellow) 50%, var(--hw-orange) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            filter: drop-shadow(0 5px 15px rgba(255, 69, 0, 0.5));
        }

        p {
            color: var(--hw-yellow);
            font-size: 1.2rem;
            margin-bottom: 35px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-style: italic;
        }

        /* Botões Estilo Corrida */
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn-hw {
            background: var(--hw-orange);
            color: white;
            text-decoration: none;
            border: none;
            padding: 15px 35px;
            border-radius: 5px; /* Bordas retas */
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 4px 4px 0px #8b0000;
            font-size: 1rem;
            font-style: italic;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--hw-yellow);
            box-shadow: 4px 4px 0px var(--hw-orange);
            color: var(--hw-yellow);
        }

        .btn-hw:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px #8b0000;
            filter: brightness(1.2);
        }

        .btn-hw:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px;
        }

        /* Animação de Faíscas Subindo */
        @keyframes drift {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

    </style>
</head>
<body>

    <div id="glitter-container"></div>

    <div class="cartao-hw">
        <h1>HOT WHEELS</h1>
        <p>It's not the same without the flame.</p>
       
        <div class="btn-group">
            <a href="https://shop.mattel.com/collections/hot-wheels" target="_blank" class="btn-hw">Race Now</a>
            <button class="btn-hw btn-outline" onclick="alert('Ligando os motores da Garagem Futurista...')">Garagem</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('glitter-container');
        const count = 60;

        for (let i = 0; i < count; i++) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
           
            const width = Math.random() * 2 + 1 + 'px';
            const height = Math.random() * 10 + 5 + 'px'; // Mais compridas como faíscas
            sparkle.style.width = width;
            sparkle.style.height = height;
           
            sparkle.style.left = Math.random() * 100 + 'vw';
            sparkle.style.top = '100vh';
           
            sparkle.style.animationDuration = Math.random() * 1.5 + 0.5 + 's';
            sparkle.style.animationDelay = Math.random() * 5 + 's';

            container.appendChild(sparkle);
        }
    </script>
</body>
</html>
